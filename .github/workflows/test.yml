# =============================================================================
# test.yml — RacePulse 자동 테스트 CI 파이프라인
# =============================================================================
# 언제 실행되는가?
#   - develop 브랜치에 push 할 때
#   - main 브랜치로 Pull Request 를 열거나 업데이트할 때
#
# 무엇을 실행하는가?
#   - backend  : ./gradlew test  (JUnit 5)
#   - ml       : pytest          (pytest-asyncio)
#   - frontend : npm run test    (Vitest)
#
# 각 Job은 독립적으로 병렬 실행됩니다.
# 세 Job 중 하나라도 실패하면 PR 머지가 차단됩니다.
# =============================================================================

name: Test

on:
  push:
    branches:
      - develop       # develop 브랜치 직접 push 시 실행
  pull_request:
    branches:
      - main          # main 으로 PR 열릴 때 실행 (develop → main 머지 전 검증)

# =============================================================================
# Job 1: Spring Boot 백엔드 테스트
# =============================================================================
jobs:
  backend:
    name: Backend (JUnit 5)
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          # Gradle 의존성 캐시 — 두 번째 실행부터 빠릅니다
          cache: gradle

      - name: 테스트 실행
        working-directory: racepulse/backend
        # 테스트에 필요한 환경 변수를 GitHub Secrets 또는 더미값으로 제공합니다.
        # CI 환경에서는 실제 외부 API를 호출하지 않으므로 더미값으로 충분합니다.
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-key-at-least-32-chars-long!!' }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID || 'ci-kakao-client-id' }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET || 'ci-kakao-client-secret' }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY || 'BBwrl6_6mhefxrXiWVrmBu0c0gpirgq8oELIn-jQ52eTyFlwTVgiMg8BtRaedcR8hbZo122yFbBzDXrnFeXfOb0' }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY || 'GYzBKO--WpjZ3OQy_J2vkMbv_Ktgtt_R7f2v9536pWs' }}
        run: ./gradlew test --no-daemon

      - name: 테스트 결과 리포트 업로드
        # 테스트 실패 시에도 결과 파일을 업로드합니다 (if: always())
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: racepulse/backend/build/reports/tests/test/
          retention-days: 7

# =============================================================================
# Job 2: ML 서버 테스트 (Python)
# =============================================================================
  ml:
    name: ML Server (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          # pip 캐시 — 두 번째 실행부터 의존성 설치가 빠릅니다
          cache: pip
          cache-dependency-path: racepulse/ml-server/requirements.txt

      - name: 의존성 설치
        working-directory: racepulse/ml-server
        run: pip install -r requirements.txt

      - name: 테스트 실행
        working-directory: racepulse/ml-server
        # CI 환경에서는 DB/Redis 없이 Mock 기반으로 실행됩니다
        env:
          DATABASE_URL: postgresql+asyncpg://ci:ci@localhost/ci
          REDIS_URL: redis://localhost:6379
          OPENAI_API_KEY: ci-test-key
        run: pytest tests/ -v --tb=short

# =============================================================================
# Job 3: 프론트엔드 테스트 (Vitest)
# =============================================================================
  frontend:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # node_modules 캐시
          cache: npm
          cache-dependency-path: racepulse/frontend/package-lock.json

      - name: 의존성 설치
        working-directory: racepulse/frontend
        run: npm ci

      - name: 테스트 실행
        working-directory: racepulse/frontend
        run: npm run test

      - name: 타입 체크
        working-directory: racepulse/frontend
        # 테스트 통과해도 타입 에러가 있으면 실패로 처리합니다
        run: npx tsc --noEmit
