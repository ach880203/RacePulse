# =============================================================================
# test.yml — RacePulse 자동 테스트 CI 파이프라인
# =============================================================================
name: Test

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main

jobs:
# =============================================================================
# Job 1: Spring Boot 백엔드 테스트
# =============================================================================
  backend:
    name: Backend (JUnit 5)
    runs-on: ubuntu-latest

    # BackendApplicationTests(@SpringBootTest)가 실제 DB/Redis 연결을 시도합니다.
    # services 블록으로 CI 안에 Docker 컨테이너를 띄웁니다.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: racepulse
          POSTGRES_USER: racepulse
          POSTGRES_PASSWORD: racepulse_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: 테스트 실행
        working-directory: racepulse/backend
        env:
          # Spring Boot 환경변수는 SPRING_DATASOURCE_URL 형식으로 자동 주입됩니다.
          # application-dev.yaml 의 spring.datasource.url 을 덮어씁니다.
          SPRING_PROFILES_ACTIVE: dev
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/racepulse
          SPRING_DATASOURCE_USERNAME: racepulse
          SPRING_DATASOURCE_PASSWORD: racepulse_dev
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-test-secret-key-at-least-32-chars-long!!' }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID || 'ci-kakao-client-id' }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET || 'ci-kakao-client-secret' }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY || 'BBwrl6_6mhefxrXiWVrmBu0c0gpirgq8oELIn-jQ52eTyFlwTVgiMg8BtRaedcR8hbZo122yFbBzDXrnFeXfOb0' }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY || 'GYzBKO--WpjZ3OQy_J2vkMbv_Ktgtt_R7f2v9536pWs' }}
        run: ./gradlew test --no-daemon

      - name: 테스트 결과 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: racepulse/backend/build/reports/tests/test/
          retention-days: 7

# =============================================================================
# Job 2: ML 서버 테스트
# =============================================================================
  ml:
    name: ML Server (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: racepulse/ml-server/requirements.txt

      - name: 의존성 설치
        working-directory: racepulse/ml-server
        run: pip install -r requirements.txt

      - name: 테스트 실행
        working-directory: racepulse/ml-server
        env:
          # SQLAlchemy 모델 import 시 DATABASE_URL이 필요합니다.
          # 실제 연결은 하지 않고(Mock 사용) import만 성공하면 됩니다.
          DATABASE_URL: postgresql+asyncpg://ci:ci@localhost/ci
          REDIS_URL: redis://localhost:6379
          OPENAI_API_KEY: ci-test-key
          # app 패키지를 Python이 찾을 수 있도록 ml-server 경로를 추가합니다.
          PYTHONPATH: .
        run: pytest tests/ -v --tb=short

# =============================================================================
# Job 3: 프론트엔드 테스트
# =============================================================================
  frontend:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 20 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: racepulse/frontend/package-lock.json

      - name: 의존성 설치
        working-directory: racepulse/frontend
        run: npm ci

      - name: 테스트 실행
        working-directory: racepulse/frontend
        run: npm run test

      - name: 타입 체크
        working-directory: racepulse/frontend
        run: npx tsc --noEmit
