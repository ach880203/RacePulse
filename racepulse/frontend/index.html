<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <!-- preconnect = 폰트 서버와 미리 연결해 첫 글꼴 로딩 속도를 조금 더 빠르게 합니다. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- favicon = 브라우저 탭에 보이는 작은 아이콘입니다. -->
    <link rel="icon" href="/favicon.ico" />
    <!-- theme-color = 모바일 브라우저 상단 UI 색을 앱 브랜드 색과 맞추기 위한 설정입니다. -->
    <meta name="theme-color" content="#080e1f" />
    <!-- 아래 메타 태그들은 iPhone/iPad에서 웹앱처럼 보이게 돕는 설정입니다. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="레이스펄스" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>레이스펄스</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
