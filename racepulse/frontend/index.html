<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <!-- preconnect = 폰트 서버와 미리 연결해 첫 글꼴 로딩 속도를 조금 더 빠르게 합니다. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- dns-prefetch = API 서버 주소를 미리 해석해 첫 API 호출 지연을 조금 줄입니다. -->
    <link rel="dns-prefetch" href="http://localhost:8080" />
    <!-- preload = 첫 화면에 바로 필요한 자원을 미리 요청해 LCP를 줄이는 힌트입니다. -->
    <link rel="preload" href="/intro-poster.jpg" as="image" />
    <link rel="preload" href="/intro-video.mp4" as="video" type="video/mp4" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap&text=RacePulse%EB%A0%88%EC%9D%B4%EC%8A%A4%ED%8E%84%EC%8A%A4%EA%B0%80%EB%82%98%EB%8B%A4%EB%9D%BC%EB%A7%88%EB%B0%94%EC%82%AC%EC%95%84%EC%9E%90%EC%B0%A8%EC%B9%B4%ED%83%80%ED%8C%8C%ED%95%98%EC%A3%BC%EC%9A%94%EC%9D%BC%EA%B2%BD%EB%A7%88%EB%B6%84%EC%84%9D%EC%98%88%EC%B8%A1%EB%AA%A9%EB%A1%9D%EC%83%81%EC%84%B8%EB%8C%80%EC%8B%9C%EB%B3%B4%EB%93%9C"
      rel="stylesheet"
    />
    <!-- favicon = 브라우저 탭에 보이는 작은 아이콘입니다. -->
    <link rel="icon" href="/favicon.ico" />
    <!-- theme-color = 모바일 브라우저 상단 UI 색을 앱 브랜드 색과 맞추기 위한 설정입니다. -->
    <meta name="theme-color" content="#080e1f" />
    <!-- 아래 메타 태그들은 iPhone/iPad에서 웹앱처럼 보이게 돕는 설정입니다. -->
    <!-- mobile-web-app-capable = Android Chrome용 PWA 설치 활성화 (표준) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- apple-mobile-web-app-capable = iOS Safari용 (deprecated이지만 하위 호환용으로 유지) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="레이스펄스" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>레이스펄스</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
